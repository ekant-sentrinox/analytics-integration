otel_collector {
    # -------------------------------------------------------------------------
    # Core Configuration
    # -------------------------------------------------------------------------
    grpc_port = 4317

    # -------------------------------------------------------------------------
    # Startup Script (DuckDB S3 + DuckLake setup + Table Creation)
    # -------------------------------------------------------------------------
    startup_script_provider {
    content = """
    INSTALL httpfs;
    LOAD httpfs;
    INSTALL arrow FROM community;
    LOAD arrow;
    CREATE OR REPLACE SECRET minio_s3 (
      TYPE S3,
      KEY_ID 'minioadmin',
      SECRET 'minioadmin123',
      ENDPOINT 'minio:9000',
      USE_SSL false,
      URL_STYLE 'path'
    );
    ATTACH 'ducklake:postgres:host=postgres port=5432 user=sentrinox password=sentrinox dbname=sentrinox_db' AS ollylake (
      DATA_PATH 's3://ollylake/main',
      OVERRIDE_DATA_PATH True
    );

    CREATE TABLE IF NOT EXISTS ollylake.main.gateway_metrics (
      name VARCHAR,
      description VARCHAR,
      unit VARCHAR,
      metric_type VARCHAR,
      start_time_ms TIMESTAMP,
      time_ms TIMESTAMP,
      attributes MAP(VARCHAR, VARCHAR),
      resource_attributes MAP(VARCHAR, VARCHAR),
      scope_name VARCHAR,
      scope_version VARCHAR,
      value_double DOUBLE,
      value_int BIGINT,
      count BIGINT,
      sum DOUBLE,
      bucket_counts BIGINT[],
      explicit_bounds DOUBLE[],
      quantile_values STRUCT(
        quantile DOUBLE,
        value DOUBLE
      )[],
      is_monotonic BOOLEAN,
      aggregation_temporality VARCHAR
    );
    """
    }
    # -------------------------------------------------------------------------
    # Authentication Configuration
    # -------------------------------------------------------------------------
    authentication = "jwt"
    secret_key = "Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tdGhpcy1rZXktbXVzdC1iZS1hdC1sZWFzdC02NC1ieXRlcy1sb25nISE="

    users = [
        { username = admin, password = admin }
    ]

    jwt_token.expiration = "24h"
    service_name = "otel-collector"



    ingestion {
        min_bucket_size = 1048576
        max_delay_ms = 5000
        queue_config_refresh_delay_ms = 120000
    }


         ingestion_task_factory_provider {
             class = "io.dazzleduck.sql.commons.ingestion.DuckLakeIngestionTaskFactoryProvider"
             ingestion_queue_table_mapping = [
                 { ingestion_queue = "metrics", output_path = "s3://ollylake/main/gateway_metrics" ,catalog = "ollylake", schema = "main", table = "gateway_metrics" }
             ]
         }
}