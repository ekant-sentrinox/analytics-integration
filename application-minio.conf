otel_collector {
    # -------------------------------------------------------------------------
    # Core Configuration
    # -------------------------------------------------------------------------
    grpc_port = 4317

    # -------------------------------------------------------------------------
    # Startup Script (DuckDB S3 + DuckLake setup + Table Creation)
    # -------------------------------------------------------------------------
    startup_script = """
    INSTALL httpfs;
    LOAD httpfs;
    INSTALL arrow FROM community;
    LOAD arrow;
    CREATE OR REPLACE SECRET minio_s3 (
      TYPE S3,
      KEY_ID 'minioadmin',
      SECRET 'minioadmin123',
      ENDPOINT 'minio:9000',
      USE_SSL false,
      URL_STYLE 'path'
    );
    ATTACH 'ducklake:postgres:host=postgres port=5432 user=sentrinox password=sentrinox dbname=sentrinox_db' AS otel (
      DATA_PATH 's3://otel/main',
      OVERRIDE_DATA_PATH True
    );
    CREATE TABLE IF NOT EXISTS otel.main.logs (
      timestamp TIMESTAMP,
      observed_timestamp TIMESTAMP,
      severity_number INTEGER,
      severity_text VARCHAR,
      body VARCHAR,
      trace_id VARCHAR,
      span_id VARCHAR,
      flags INTEGER,
      event_name VARCHAR,
      attributes MAP(VARCHAR, VARCHAR),
      resource_attributes MAP(VARCHAR, VARCHAR),
      scope_name VARCHAR,
      scope_version VARCHAR
    );
    CREATE TABLE IF NOT EXISTS otel.main.traces (
      trace_id VARCHAR,
      span_id VARCHAR,
      parent_span_id VARCHAR,
      name VARCHAR,
      kind VARCHAR,
      start_time_ms TIMESTAMP,
      end_time_ms TIMESTAMP,
      duration_ms BIGINT,
      status_code VARCHAR,
      status_message VARCHAR,
      attributes MAP(VARCHAR, VARCHAR),
      resource_attributes MAP(VARCHAR, VARCHAR),
      scope_name VARCHAR,
      scope_version VARCHAR,
      events STRUCT(
        name VARCHAR,
        time_ms BIGINT,
        attributes MAP(VARCHAR, VARCHAR)
      )[],
      links STRUCT(
        trace_id VARCHAR,
        span_id VARCHAR,
        attributes MAP(VARCHAR, VARCHAR)
      )[]
    );
    CREATE TABLE IF NOT EXISTS otel.main.metrics (
      name VARCHAR,
      description VARCHAR,
      unit VARCHAR,
      metric_type VARCHAR,
      start_time_ms TIMESTAMP,
      time_ms TIMESTAMP,
      attributes MAP(VARCHAR, VARCHAR),
      resource_attributes MAP(VARCHAR, VARCHAR),
      scope_name VARCHAR,
      scope_version VARCHAR,
      value_double DOUBLE,
      value_int BIGINT,
      count BIGINT,
      sum DOUBLE,
      bucket_counts BIGINT[],
      explicit_bounds DOUBLE[],
      quantile_values STRUCT(
        quantile DOUBLE,
        value DOUBLE
      )[],
      is_monotonic BOOLEAN,
      aggregation_temporality VARCHAR
    );
    """

    # -------------------------------------------------------------------------
    # Authentication Configuration
    # -------------------------------------------------------------------------
    authentication = "jwt"
    secret_key = "Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tdGhpcy1rZXktbXVzdC1iZS1hdC1sZWFzdC02NC1ieXRlcy1sb25nISE="

    users = [
        { username = admin, password = admin }
    ]

    jwt_token.expiration = "24h"
    service_name = "otel-collector"

    # -------------------------------------------------------------------------
    # S3 Output Paths (MinIO)
    # -------------------------------------------------------------------------
    log_ingestion {
        output_path = "s3://otel/main/logs"
        partition_by = []
        min_bucket_size = 1048576
        max_delay_ms = 5000
    }

    trace_ingestion {
        output_path = "s3://otel/main/traces"
        partition_by = []
        min_bucket_size = 1048576
        max_delay_ms = 5000
    }

    metric_ingestion {
        output_path = "s3://otel/main/metrics"
        partition_by = []
        min_bucket_size = 1048576
        max_delay_ms = 5000
    }
         log_ingestion_task_factory_provider {
             class = "io.dazzleduck.sql.commons.ingestion.DuckLakeIngestionTaskFactoryProvider"
             ingestion_queue_table_mapping = [
                 { ingestion_queue = "logs",    catalog = "otel", schema = "main", table = "logs"    }
             ]
         }

         trace_ingestion_task_factory_provider {
             class = "io.dazzleduck.sql.commons.ingestion.DuckLakeIngestionTaskFactoryProvider"
             ingestion_queue_table_mapping = [
                 { ingestion_queue = "traces",  catalog = "otel", schema = "main", table = "traces"  }
             ]
         }

         metric_ingestion_task_factory_provider {
             class = "io.dazzleduck.sql.commons.ingestion.DuckLakeIngestionTaskFactoryProvider"
             ingestion_queue_table_mapping = [
                 { ingestion_queue = "metrics", catalog = "otel", schema = "main", table = "metrics" }
             ]
         }
}